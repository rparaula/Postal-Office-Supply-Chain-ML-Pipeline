# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP app to Azure Web App - post-office-bi-system

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PUBLISH_DIR: ${{ github.workspace }}\published

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild path
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore COSCPFWA\COSCPFWA.sln

      - name: Publish web app
        run: >
          msbuild COSCPFWA\COSCPFWA\COSCPFWA.csproj
          /p:Configuration=Release
          /p:DeployOnBuild=true
          /p:WebPublishMethod=FileSystem
          /p:DeleteExistingFiles=True
          /p:publishUrl="${{ env.PUBLISH_DIR }}"

      - name: Show published files
        shell: pwsh
        run: |
          Write-Host "Publish directory:"
          Write-Host "${{ env.PUBLISH_DIR }}"
          Get-ChildItem "${{ env.PUBLISH_DIR }}" -Recurse

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: ASP-app
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ASP-app
          path: published

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8685AB3BE9BC48EAA1A92CD9EE520701 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AD59A4636D8640DCA18804BF438FB35C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C91F0C5CBC0347F8ABEE12851695E23B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: post-office-bi-system
          slot-name: Production
          package: published
